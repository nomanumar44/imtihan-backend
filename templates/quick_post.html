<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Quick Post — ImtihanHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

  <!-- Password Gate -->
  <div id="gate" class="flex items-center justify-center min-h-screen px-4">
    <div class="w-full max-w-sm bg-white rounded-2xl shadow-lg border border-slate-200 p-6 fade-in">
      <div class="flex items-center gap-2 mb-1">
        <div class="w-8 h-8 rounded-lg bg-[#2563EB] flex items-center justify-center text-white font-black text-sm">Q</div>
        <h1 class="text-lg font-black text-slate-900">Quick Post</h1>
      </div>
      <p class="text-xs text-slate-500 mb-5">Enter the admin secret to continue.</p>
      <input
        id="passwordInput"
        type="password"
        placeholder="Admin secret"
        class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm focus:border-[#2563EB] focus:ring-2 focus:ring-blue-100 focus:outline-none transition mb-3"
      />
      <button
        onclick="unlock()"
        class="w-full py-3 rounded-xl bg-[#2563EB] text-white text-sm font-bold hover:bg-blue-700 transition"
      >
        Unlock
      </button>
      <p id="gateError" class="text-xs text-red-500 mt-2 hidden">Invalid secret.</p>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" class="hidden max-w-lg mx-auto px-4 py-6">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg bg-[#2563EB] flex items-center justify-center text-white font-black text-sm">Q</div>
        <div>
          <h1 class="text-base font-black text-slate-900">Quick Post</h1>
          <p class="text-[10px] text-slate-400">ImtihanHub Admin</p>
        </div>
      </div>
      <button onclick="lock()" class="text-xs font-semibold text-slate-400 hover:text-red-500 transition">Lock</button>
    </div>

    <!-- Status -->
    <div id="status" class="hidden mb-4 rounded-xl px-4 py-3 text-sm font-semibold fade-in"></div>

    <!-- Form -->
    <form id="postForm" onsubmit="return false;" class="bg-white rounded-2xl border border-slate-200 p-5 space-y-4 shadow-sm">
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Title</label>
        <input
          id="title"
          type="text"
          placeholder="Post title"
          class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:border-[#2563EB] focus:ring-2 focus:ring-blue-100 focus:outline-none transition"
        />
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Category</label>
          <select
            id="category"
            class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:border-[#2563EB] focus:ring-2 focus:ring-blue-100 focus:outline-none transition bg-white"
          >
            <option value="">Loading...</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Type</label>
          <select
            id="type"
            class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:border-[#2563EB] focus:ring-2 focus:ring-blue-100 focus:outline-none transition bg-white"
          >
            <option value="news">News</option>
            <option value="blog">Blog</option>
          </select>
        </div>
      </div>

      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Content</label>
        <textarea
          id="content"
          rows="6"
          placeholder="Write your post content..."
          class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:border-[#2563EB] focus:ring-2 focus:ring-blue-100 focus:outline-none transition resize-none"
        ></textarea>
      </div>

      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Excerpt (optional)</label>
        <input
          id="excerpt"
          type="text"
          placeholder="Short summary"
          class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:border-[#2563EB] focus:ring-2 focus:ring-blue-100 focus:outline-none transition"
        />
      </div>

      <div class="flex items-center gap-2">
        <input id="featured" type="checkbox" class="w-4 h-4 rounded border-slate-300 text-[#2563EB] focus:ring-blue-100" />
        <label for="featured" class="text-sm font-semibold text-slate-700">Featured post</label>
      </div>

      <div class="flex gap-3 pt-2">
        <button
          onclick="submitPost('draft')"
          id="btnDraft"
          class="flex-1 py-3 rounded-xl border border-slate-200 text-sm font-bold text-slate-600 hover:bg-slate-50 transition"
        >
          Save Draft
        </button>
        <button
          onclick="submitPost('published')"
          id="btnPublish"
          class="flex-1 py-3 rounded-xl bg-[#2563EB] text-white text-sm font-bold hover:bg-blue-700 transition"
        >
          Publish
        </button>
      </div>
    </form>

    <!-- Recent Posts -->
    <div class="mt-8">
      <h2 class="text-sm font-black text-slate-900 uppercase tracking-wider mb-3">Last 5 Posts</h2>
      <div id="recentList" class="space-y-3">
        <p class="text-xs text-slate-400">Loading...</p>
      </div>
    </div>
  </div>

  <script>
    const TOKEN_KEY = 'imtihan_quick_post_token';
    const API_BASE = window.location.origin + '/api';

    function getToken() { return localStorage.getItem(TOKEN_KEY) || ''; }
    function setToken(t) { localStorage.setItem(TOKEN_KEY, t); }
    function clearToken() { localStorage.removeItem(TOKEN_KEY); }

    // Unlock gate
    async function unlock() {
      const val = document.getElementById('passwordInput').value.trim();
      if (!val) return;
      // Validate against API
      try {
        const res = await fetch(API_BASE + '/admin/quick-post/recent/', {
          headers: { 'X-Admin-Token': val }
        });
        if (res.ok) {
          setToken(val);
          showApp();
          loadCategories();
          loadRecent();
        } else {
          document.getElementById('gateError').classList.remove('hidden');
        }
      } catch {
        document.getElementById('gateError').classList.remove('hidden');
      }
    }

    function lock() {
      clearToken();
      location.reload();
    }

    function showApp() {
      document.getElementById('gate').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
    }

    // Auto-unlock if token exists
    (async function init() {
      const tok = getToken();
      if (tok) {
        try {
          const res = await fetch(API_BASE + '/admin/quick-post/recent/', {
            headers: { 'X-Admin-Token': tok }
          });
          if (res.ok) {
            showApp();
            loadCategories();
            loadRecent();
          } else {
            clearToken();
          }
        } catch {
          clearToken();
        }
      }
    })();

    // Gate enter key
    document.getElementById('passwordInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') unlock();
    });

    async function loadCategories() {
      try {
        const res = await fetch(API_BASE + '/categories/');
        const data = await res.json();
        const sel = document.getElementById('category');
        sel.innerHTML = '<option value="">Select category</option>' +
          (data.categories || []).map(c => `<option value="${c.id}">${c.name}</option>`).join('');
      } catch {
        document.getElementById('category').innerHTML = '<option value="">Error loading</option>';
      }
    }

    async function loadRecent() {
      const list = document.getElementById('recentList');
      try {
        const res = await fetch(API_BASE + '/admin/quick-post/recent/', {
          headers: { 'X-Admin-Token': getToken() }
        });
        const data = await res.json();
        if (!data.posts || data.posts.length === 0) {
          list.innerHTML = '<p class="text-xs text-slate-400">No posts yet.</p>';
          return;
        }
        list.innerHTML = data.posts.map(p => {
          const badge = p.status === 'published'
            ? '<span class="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-1.5 py-0.5 rounded">Published</span>'
            : '<span class="text-[10px] font-bold text-slate-500 bg-slate-100 px-1.5 py-0.5 rounded">Draft</span>';
          const typeBadge = p.type === 'news'
            ? '<span class="text-[10px] font-bold text-blue-600 bg-blue-50 px-1.5 py-0.5 rounded">News</span>'
            : '<span class="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-1.5 py-0.5 rounded">Blog</span>';
          const date = new Date(p.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
          return `
            <div class="bg-white rounded-xl border border-slate-200 p-4 flex items-start justify-between gap-3">
              <div class="min-w-0">
                <div class="flex items-center gap-1.5 mb-1">
                  ${badge}
                  ${typeBadge}
                </div>
                <p class="text-sm font-bold text-slate-800 truncate">${escapeHtml(p.title)}</p>
                <p class="text-[11px] text-slate-400 mt-0.5">${p.category || ''} &middot; ${date}</p>
              </div>
              <a href="${p.admin_url}" target="_blank"
                 class="shrink-0 text-xs font-bold text-[#2563EB] hover:underline">Edit</a>
            </div>
          `;
        }).join('');
      } catch {
        list.innerHTML = '<p class="text-xs text-red-400">Failed to load posts.</p>';
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function submitPost(status) {
      const title = document.getElementById('title').value.trim();
      const content = document.getElementById('content').value.trim();
      const categoryId = document.getElementById('category').value;
      const type = document.getElementById('type').value;
      const excerpt = document.getElementById('excerpt').value.trim();
      const featured = document.getElementById('featured').checked;

      if (!title || !content || !categoryId) {
        showStatus('Title, content and category are required.', 'error');
        return;
      }

      const btnPublish = document.getElementById('btnPublish');
      const btnDraft = document.getElementById('btnDraft');
      btnPublish.disabled = true;
      btnDraft.disabled = true;
      btnPublish.textContent = 'Publishing...';
      btnDraft.textContent = 'Saving...';

      try {
        const res = await fetch(API_BASE + '/admin/quick-post/', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Admin-Token': getToken(),
          },
          body: JSON.stringify({
            title,
            content,
            category_id: parseInt(categoryId),
            type,
            status,
            excerpt,
            is_featured: featured,
          }),
        });
        const data = await res.json();
        if (res.ok) {
          showStatus(status === 'published' ? 'Post published successfully!' : 'Draft saved.', 'success');
          document.getElementById('postForm').reset();
          loadRecent();
        } else {
          showStatus(data.error || 'Failed to create post.', 'error');
        }
      } catch {
        showStatus('Network error. Please try again.', 'error');
      } finally {
        btnPublish.disabled = false;
        btnDraft.disabled = false;
        btnPublish.textContent = 'Publish';
        btnDraft.textContent = 'Save Draft';
      }
    }

    function showStatus(msg, type) {
      const el = document.getElementById('status');
      el.classList.remove('hidden', 'bg-emerald-50', 'text-emerald-700', 'bg-red-50', 'text-red-700');
      if (type === 'success') {
        el.classList.add('bg-emerald-50', 'text-emerald-700');
      } else {
        el.classList.add('bg-red-50', 'text-red-700');
      }
      el.textContent = msg;
      setTimeout(() => el.classList.add('hidden'), 4000);
    }
  </script>
</body>
</html>
