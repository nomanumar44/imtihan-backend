<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Imtihan.pk Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f8f9fa;--card:#fff;--txt:#1a1a2e;--sub:#6b7280;--mute:#9ca3af;--brd:#e5e7eb;--green:#1D9E75;--green-dk:#0F6E56;--r:8px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
    /* Animated flowing gradient */
    .bg-gradient{position:fixed;inset:0;z-index:-4;background:linear-gradient(-45deg,#0B2A3C,#0D3D4D,#0B4A3E,#1D9E75,#0B2A3C);background-size:400% 400%;animation:gradientFlow 15s ease infinite}
    @keyframes gradientFlow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
    /* Subtle dot pattern */
    body::after{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,0.06) 1.5px,transparent 1.5px);background-size:28px 28px;z-index:-2}
    /* Decorative floating shapes */
    .shape{position:fixed;border-radius:50%;filter:blur(80px);opacity:.35;z-index:-1;animation:float 8s ease-in-out infinite}
    .shape-1{width:500px;height:500px;background:rgba(29,158,117,0.4);top:-100px;left:-100px;animation-delay:0s}
    .shape-2{width:400px;height:400px;background:rgba(13,61,77,0.5);bottom:-80px;right:-80px;animation-delay:-2.5s}
    .shape-3{width:300px;height:300px;background:rgba(255,255,255,0.08);top:50%;left:60%;animation-delay:-5s}
    @keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-30px) scale(1.05)}}
    /* Spinning rings */
    .ring{position:fixed;border:1px solid rgba(255,255,255,0.04);border-radius:50%;z-index:-2}
    .ring-1{width:600px;height:600px;top:10%;left:-10%;animation:spin 30s linear infinite}
    .ring-2{width:400px;height:400px;bottom:5%;right:-5%;animation:spin 25s linear infinite reverse}
    .ring-3{width:700px;height:700px;top:40%;left:40%;animation:spin 35s linear infinite}
    @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    /* Floating particles */
    .particle{position:fixed;width:4px;height:4px;background:rgba(255,255,255,0.15);border-radius:50%;z-index:-1;animation:particleFloat linear infinite}
    .p1{top:110%;left:20%;animation-duration:12s;animation-delay:0s}
    .p2{top:110%;left:50%;animation-duration:15s;animation-delay:-3s;width:3px;height:3px}
    .p3{top:110%;left:80%;animation-duration:10s;animation-delay:-6s}
    .p4{top:110%;left:35%;animation-duration:18s;animation-delay:-8s;width:2px;height:2px}
    .p5{top:110%;left:65%;animation-duration:14s;animation-delay:-4s;width:3px;height:3px}
    @keyframes particleFloat{0%{transform:translateY(0) translateX(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-120vh) translateX(20px);opacity:0}}
    .lc{background:rgba(255,255,255,0.95);border-radius:16px;padding:40px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,0.25),0 0 0 1px rgba(255,255,255,0.1) inset;backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.2);position:relative;overflow:hidden}
    .lc::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#1D9E75,#0F6E56,#1D9E75);background-size:200% auto;animation:shimmer 3s linear infinite}
    @keyframes shimmer{0%{background-position:0% 50%}100%{background-position:200% 50%}}
    .ll{font-size:22px;font-weight:600;color:var(--txt);text-align:center;margin-bottom:6px}.ll span{color:var(--green)}
    .ls{text-align:center;font-size:13px;color:var(--mute);margin-bottom:32px}
    .fg{margin-bottom:18px}
    .fg label{display:block;font-size:12px;font-weight:500;color:var(--sub);margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px}
    .fg input{width:100%;padding:10px 14px;border:.5px solid var(--brd);border-radius:var(--r);font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;background:var(--bg);color:var(--txt)}
    .fg input:focus{border-color:var(--green)}
    .bl{width:100%;padding:11px;background:var(--green);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:background .15s,transform .1s}
    .bl:hover{background:var(--green-dk);transform:translateY(-1px)}
    .ae{background:#FCEBEB;color:#A32D2D;padding:10px 14px;border-radius:var(--r);font-size:13px;margin-bottom:16px;text-align:center}
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="shape shape-1"></div>
  <div class="shape shape-2"></div>
  <div class="shape shape-3"></div>
  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>
  <div class="particle p1"></div>
  <div class="particle p2"></div>
  <div class="particle p3"></div>
  <div class="particle p4"></div>
  <div class="particle p5"></div>
  <div class="lc">
    <div class="ll">Imtihan<span>.pk</span></div>
    <div class="ls">Admin Portal Login</div>
    {% if messages %}{% for message in messages %}<div class="ae">{{ message }}</div>{% endfor %}{% endif %}
    <form method="post" action="{% url 'dashboard_login' %}">
      {% csrf_token %}
      <div class="fg"><label for="username">Username</label><input type="text" id="username" name="username" placeholder="Enter username" required autofocus></div>
      <div class="fg"><label for="password">Password</label><input type="password" id="password" name="password" placeholder="Enter password" required></div>
      <button type="submit" class="bl">Sign in</button>
    </form>
  </div>
</body>
</html>
